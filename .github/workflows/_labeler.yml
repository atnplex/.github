# .github/workflows/_labeler.yml
#
# What it does:  Automatically applies labels to pull requests based on which
#                files were changed, using the repo's .github/labeler.yml config.
# When it runs:  Called by consumer repos via `workflow_call` on pull_request events.
# Permissions:   contents: read, pull-requests: write

name: _labeler

on:
  workflow_call:
    inputs:
      runner:
        description: |
          Runner label(s) to use for this job. Accepts a string (single label)
          or a JSON array string for multiple labels, e.g. '["self-hosted","linux"]'.
          Defaults to the standard atnplex runner expression — private atnplex repos
          use self-hosted runners; public or external repos use ubuntu-latest.
        type: string
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    name: Apply PR Labels
    runs-on: >
      ${{ inputs.runner != '' && inputs.runner
        || (github.event.repository.private == true && github.repository_owner == 'atnplex')
          && fromJSON('["self-hosted","linux"]')
        || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - name: Apply labels from repo config
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false
