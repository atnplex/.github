# .github/workflows/_labeler.yml
#
# What it does:  Automatically applies labels to pull requests based on which
#                files were changed, using the repo's labeler.yml config.
# When it runs:  Called by consumer repos via `workflow_call` on pull_request events.
# Permissions:   contents: read, pull-requests: write

name: _labeler

on:
  workflow_call:
    inputs:
      runner:
        description: >
          Runner label(s) to use for this job. Accepts a JSON string for
          multi-label runners (e.g. '["self-hosted","linux"]') or a plain
          string (e.g. 'ubuntu-latest'). Defaults to the standard atnplex
          runner expression: self-hosted for private org repos, ubuntu-latest
          for everything else.
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    name: Apply PR Labels
    runs-on: >
      ${{
        inputs.runner != ''
          && fromJSON(inputs.runner)
          || ((github.event.repository.private == true && github.repository_owner == 'atnplex')
              && fromJSON('["self-hosted","linux"]')
              || 'ubuntu-latest')
      }}
    timeout-minutes: 10

    steps:
      - name: Apply labels from repo config
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false
