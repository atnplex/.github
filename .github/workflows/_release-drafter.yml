# .github/workflows/_release-drafter.yml
#
# What it does:  Automatically maintains a draft release by categorizing merged
#                pull requests based on their labels.
# When it runs:  Called by consumer repos via `workflow_call` on push to main/master.
# Permissions:   contents: write (to create/update draft releases),
#                pull-requests: read (to read merged PR metadata)

name: _release-drafter

on:
  workflow_call:
    inputs:
      runner:
        description: |
          Runner label(s) to use for this job. Accepts a string (single label)
          or a JSON array string for multiple labels, e.g. '["self-hosted","linux"]'.
          Defaults to the standard atnplex runner expression — private atnplex repos
          use self-hosted runners; public or external repos use ubuntu-latest.
        type: string
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-drafter-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-progress release draft update

jobs:
  release-drafter:
    name: Update Draft Release
    runs-on: >
      ${{ inputs.runner != '' && inputs.runner
        || (github.event.repository.private == true && github.repository_owner == 'atnplex')
          && fromJSON('["self-hosted","linux"]')
        || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - name: Update draft release
        uses: release-drafter/release-drafter@67e173cadb2fbd3de94f4a861e0c48c913b462ae # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
