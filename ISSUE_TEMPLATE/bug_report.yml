name: Bug report
description: Report a bug, regression, broken workflow, or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please provide enough detail to reproduce and triage the issue efficiently.
        For CI/infrastructure problems, logs and exact context are especially helpful.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: What part of the project is affected?
      options:
        - CI / GitHub Actions
        - Infrastructure / deployment
        - Containers / Docker
        - Networking / DNS / proxy
        - Application behavior
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Clear summary of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps, commands, inputs, or actions.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
      placeholder: Describe the actual result, errors, or symptoms.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs, screenshots, or output
      description: Paste logs or screenshots if available.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant versions, OS, runner type, browser, runtime, container image, etc.
      placeholder: |
        OS:
        Runtime/version:
        Runner type:
        Browser:
        Image/tag:
    validations:
      required: false

  - type: dropdown
    id: reproducible
    attributes:
      label: Reproducibility
      options:
        - Always
        - Intermittent
        - Only once so far
        - Unknown
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched for existing issues first
          required: true
        - label: I included enough detail to reproduce or triage the issue
          required: true
